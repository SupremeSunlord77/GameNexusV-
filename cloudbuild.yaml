substitutions:
  _PROJECT_ID: local-biz-agent-chennai-491410
  _REGION: us-west4
  _REPO: gamenexus
  _SERVICE: gamenexus-api

steps:
  # ─── Step 1: Build the frontend ─────────────────────────────────────────────
  - name: node:20
    id: frontend-build
    dir: frontend
    entrypoint: bash
    args:
      - -c
      - |
        npm ci
        npm run build

  # ─── Step 2: Deploy frontend to Firebase Hosting ───────────────────────────
  - name: node:20
    id: firebase-deploy
    dir: frontend
    entrypoint: bash
    args:
      - -c
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting --project $_PROJECT_ID --token $$FIREBASE_TOKEN
    secretEnv:
      - FIREBASE_TOKEN
    waitFor:
      - frontend-build

  # ─── Step 3: Build the backend Docker image ─────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: docker-build
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$_PROJECT_ID/$_REPO/api:$SHORT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$_PROJECT_ID/$_REPO/api:latest
      - ./backend

  # ─── Step 4: Push image to Artifact Registry ────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: docker-push
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$_PROJECT_ID/$_REPO/api
    waitFor:
      - docker-build

  # ─── Step 5: Deploy to Cloud Run ─────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: cloud-run-deploy
    entrypoint: bash
    args:
      - -c
      - |
        # Patch the image tag in service.yaml, then deploy
        sed -i "s|/api:latest|/api:$SHORT_SHA|g" backend/service.yaml
        gcloud run services replace backend/service.yaml \
          --region $_REGION \
          --project $_PROJECT_ID
    waitFor:
      - docker-push

images:
  - $_REGION-docker.pkg.dev/$_PROJECT_ID/$_REPO/api:$SHORT_SHA
  - $_REGION-docker.pkg.dev/$_PROJECT_ID/$_REPO/api:latest

availableSecrets:
  secretManager:
    - versionName: projects/$_PROJECT_ID/secrets/FIREBASE_TOKEN/versions/latest
      env: FIREBASE_TOKEN

options:
  logging: CLOUD_LOGGING_ONLY
