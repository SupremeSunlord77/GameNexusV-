apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: gamenexus-api
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/session-affinity: "true"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/session-affinity: "true"
    spec:
      containerConcurrency: 80
      containers:
        - image: us-west4-docker.pkg.dev/local-biz-agent-chennai-491410/gamenexus/api:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: DATABASE_URL
                  key: latest
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: JWT_SECRET
                  key: latest
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: REDIS_URL
                  key: latest
            - name: GOOGLE_CLOUD_PROJECT
              valueFrom:
                secretKeyRef:
                  name: GOOGLE_CLOUD_PROJECT
                  key: latest
            - name: VERTEX_AI_LOCATION
              valueFrom:
                secretKeyRef:
                  name: VERTEX_AI_LOCATION
                  key: latest
            - name: VERTEX_AI_MODEL_FLASH
              valueFrom:
                secretKeyRef:
                  name: VERTEX_AI_MODEL_FLASH
                  key: latest
            - name: VERTEX_AI_MODEL_PRO
              valueFrom:
                secretKeyRef:
                  name: VERTEX_AI_MODEL_PRO
                  key: latest
  traffic:
    - latestRevision: true
      percent: 100
